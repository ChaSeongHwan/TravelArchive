<div class="calendar-card-header flex-between">
  <div class="calendar-month-nav flex gap-8 align-center">
    <button class="btn-icon-small" id="prevMonthBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h3 class="calendar-title" id="calendarTitle">April 2026</h3>
    <button class="btn-icon-small" id="nextMonthBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <button class="btn-icon-small" id="todayBtn">
    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </button>
</div>
<div class="calendar-body">
  <div class="calendar-weekdays">
    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
  </div>
  <div class="calendar-days" id="calendarDays">
    <!-- Days will be generated by JS -->
  </div>
</div>
